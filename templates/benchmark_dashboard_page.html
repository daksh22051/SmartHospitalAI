{% extends "base.html" %}

{% block title %}Benchmarks | Smart Hospital AI{% endblock %}

{% block head_extra %}
<style>
  .benchmark-shell {
    display: grid;
    gap: 14px;
  }
  .benchmark-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .benchmark-title {
    margin: 0;
    font-size: 24px;
    font-weight: 900;
    color: #0f172a;
    letter-spacing: -0.02em;
  }
  .benchmark-sub {
    margin: 4px 0 0;
    font-size: 13px;
    color: #64748b;
    font-weight: 600;
  }
  .benchmark-btn {
    text-decoration: none;
    border: 1px solid rgba(100, 116, 139, 0.28);
    color: #334155;
    background: rgba(255, 255, 255, 0.86);
    padding: 10px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 800;
  }
  .benchmark-frame-wrap {
    border-radius: 16px;
    border: 1px solid rgba(148, 163, 184, 0.20);
    background: rgba(255,255,255,0.82);
    box-shadow: 0 16px 36px rgba(15, 23, 42, 0.10);
    overflow: hidden;
    min-height: 65vh;
  }
  .benchmark-frame {
    width: 100%;
    height: 72vh;
    min-height: 560px;
    border: 0;
    background: #ffffff;
  }
  @media (max-width: 900px) {
    .benchmark-frame { min-height: 520px; height: 70vh; }
  }
</style>
{% endblock %}

{% block content %}
<section class="benchmark-shell">
  <div class="benchmark-head">
    <div>
      <h1 class="benchmark-title">Policy Benchmark Comparison</h1>
      <p class="benchmark-sub">Generated benchmark report inside Smart Hospital app shell.</p>
    </div>
    <a class="benchmark-btn" href="/benchmark_dashboard/raw" target="_blank" rel="noopener">Open Raw Report</a>
  </div>

  <div class="benchmark-frame-wrap">
    <iframe class="benchmark-frame" src="/benchmark_dashboard/raw" title="Benchmark Report"></iframe>
  </div>
</section>
{% endblock %}
