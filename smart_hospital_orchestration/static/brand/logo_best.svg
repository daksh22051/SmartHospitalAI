<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Smart Hospital AI logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="18" y="18" width="220" height="220" rx="56" fill="#ffffff"/>
  <rect x="18" y="18" width="220" height="220" rx="56" fill="url(#bg)" opacity="0.94"/>

  <circle cx="128" cy="128" r="82" fill="none" stroke="url(#ring)" stroke-width="8" opacity="0.85"/>
  <circle cx="128" cy="128" r="68" fill="#f8fafc" opacity="0.96" filter="url(#shadow)"/>

  <!-- network nodes -->
  <g opacity="0.95" stroke-linecap="round" stroke-linejoin="round">
    <path d="M60 90 L86 74 L110 92 L128 66 L146 92 L170 74 L196 90" fill="none" stroke="#bae6fd" stroke-width="4"/>
    <path d="M60 166 L86 182 L110 164 L128 190 L146 164 L170 182 L196 166" fill="none" stroke="#99f6e4" stroke-width="4"/>
    <path d="M60 90 L60 166 M196 90 L196 166 M60 90 L86 74 M196 90 L170 74 M60 166 L86 182 M196 166 L170 182" fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.75"/>
    <circle cx="60" cy="90" r="6" fill="#0f172a"/>
    <circle cx="86" cy="74" r="6" fill="#0f172a"/>
    <circle cx="110" cy="92" r="6" fill="#0f172a"/>
    <circle cx="128" cy="66" r="6" fill="#0f172a"/>
    <circle cx="146" cy="92" r="6" fill="#0f172a"/>
    <circle cx="170" cy="74" r="6" fill="#0f172a"/>
    <circle cx="196" cy="90" r="6" fill="#0f172a"/>
    <circle cx="60" cy="166" r="6" fill="#0f172a"/>
    <circle cx="86" cy="182" r="6" fill="#0f172a"/>
    <circle cx="110" cy="164" r="6" fill="#0f172a"/>
    <circle cx="128" cy="190" r="6" fill="#0f172a"/>
    <circle cx="146" cy="164" r="6" fill="#0f172a"/>
    <circle cx="170" cy="182" r="6" fill="#0f172a"/>
    <circle cx="196" cy="166" r="6" fill="#0f172a"/>
  </g>

  <!-- hospital cross -->
  <g filter="url(#shadow)">
    <rect x="116" y="54" width="24" height="148" rx="10" fill="#0ea5e9"/>
    <rect x="54" y="116" width="148" height="24" rx="10" fill="#0ea5e9"/>
    <rect x="121" y="59" width="14" height="138" rx="7" fill="#ffffff" opacity="0.92"/>
    <rect x="59" y="121" width="138" height="14" rx="7" fill="#ffffff" opacity="0.92"/>
    <rect x="118" y="54" width="20" height="148" rx="10" fill="none" stroke="#0f172a" stroke-width="3" opacity="0.65"/>
    <rect x="54" y="118" width="148" height="20" rx="10" fill="none" stroke="#0f172a" stroke-width="3" opacity="0.65"/>
  </g>

  <!-- center AI brain -->
  <g>
    <circle cx="128" cy="128" r="35" fill="#ffffff" stroke="#0f172a" stroke-width="5"/>
    <path d="M117 112c-6 0-10 4-10 10 0 3 1 6 4 8-2 2-4 5-4 8 0 6 4 10 10 10h6" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
    <path d="M139 112c6 0 10 4 10 10 0 3-1 6-4 8 2 2 4 5 4 8 0 6-4 10-10 10h-6" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
    <path d="M128 104v48" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
    <path d="M110 124h36" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- pulse + chart accents -->
  <path d="M72 136h18l8-12 11 19 13-25 10 18h52" fill="none" stroke="#34d399" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M168 96l18-18" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <circle cx="190" cy="74" r="7" fill="#f59e0b"/>
  <circle cx="190" cy="74" r="15" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.45"/>
</svg>
