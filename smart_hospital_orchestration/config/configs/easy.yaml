description: Easy difficulty hospital scenario

environment:
  duration: 168
  time_step: 1
  random_seed: 42

  resources:
    icu_beds: 10
    target_utilization: 0.60
    equipment_per_bed:
      - ventilator
      - monitor
      - infusion_pump

  staff:
    doctors: 5
    max_patients_per_doctor: 3
    specialties:
      - general
      - icu_specialist

  patients:
    arrival_rate: 1.5
    priority_distribution:
      critical: 0.05
      high: 0.15
      medium: 0.30
      low: 0.50
    avg_stay_duration: 48

state:
  state_dim: 64
  include_patient_history: false
  include_doctor_workload: true
  include_resource_queue: true
  normalization: minmax

reward:
  reward_weights:
    patient_outcome: 1.0
    resource_utilization: 0.3
    waiting_time: -0.1
    workload_balance: 0.1
    operational_cost: -0.05
  use_reward_shaping: true
  target_utilization: 0.60
  max_wait_threshold: 6.0

agent:
  action_space_type: discrete
  num_actions: 20
  learning_rate: 0.001
